  <rect x="635" y="95" width="210" height="135" rx="24" fill="white" stroke="#D8E8EC"/>
  <circle cx="675" cy="132" r="22" fill="#FFE4B8"/>
  <text x="712" y="128" font-family="Inter, Arial" font-size="22" font-weight="700" fill="#1F2933">Urban Data</text>
