  <!-- Backend -->
  <rect x="345" y="95" width="210" height="135" rx="24" fill="white" stroke="#D8E8EC"/>
  <rect x="375" y="118" width="54" height="54" rx="16" fill="url(#buttonGrad)"/>
  <text x="452" y="128" font-family="Inter, Arial" font-size="22" font-weight="700" fill="#1F2933">Backend</text>
  <text x="452" y="154" font-family="Inter, Arial" font-size="14" fill="#667085">WebSocket API</text>
