<svg width="900" height="360" viewBox="0 0 900 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="360" rx="28" fill="#F8FCFD"/>

  <defs>
    <linearGradient id="lumiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BFEFF7"/>
