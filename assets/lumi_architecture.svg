      <stop offset="100%" stop-color="#FFE4B8"/>
    </linearGradient>
    <linearGradient id="buttonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ED6E4"/>
      <stop offset="100%" stop-color="#47B8C8"/>
    </linearGradient>
  </defs>

  <!-- App -->
  <rect x="55" y="95" width="210" height="135" rx="24" fill="white" stroke="#D8E8EC"/>
