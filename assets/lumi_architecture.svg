  <!-- Arrows -->
  <path d="M270 162H335" stroke="#47B8C8" stroke-width="4" stroke-linecap="round"/>
  <path d="M325 150L340 162L325 174" stroke="#47B8C8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

